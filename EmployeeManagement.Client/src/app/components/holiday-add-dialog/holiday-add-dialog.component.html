<h2 mat-dialog-title>{{ heading }}</h2>

<mat-dialog-content>

    @if (errorMessage) {
    <mat-error class="m-b-16">{{ errorMessage }}</mat-error>
    }

    <form [formGroup]="holidayAddForm" class="form-grid">

        <!-- Name -->
        <mat-form-field appearance="outline" class="w-100">
            <mat-label>Holiday Name</mat-label>
            <input matInput formControlName="name" placeholder="e.g. Eid Ul Fitr Holidays" />
            <mat-error>Name is required</mat-error>
        </mat-form-field>

        <!-- Start Date -->
        <mat-form-field appearance="outline" class="w-100">
            <mat-label>Start Date</mat-label>
            <input matInput [matDatepicker]="startPicker" formControlName="startDate" readonly />
            <mat-datepicker-toggle matIconSuffix [for]="startPicker" />
            <mat-datepicker #startPicker />
            <mat-error>Start date is required</mat-error>
        </mat-form-field>

        <!-- End Date -->
        <mat-form-field appearance="outline" class="w-100">
            <mat-label>End Date</mat-label>
            <input matInput [matDatepicker]="endPicker" formControlName="endDate" readonly />
            <mat-datepicker-toggle matIconSuffix [for]="endPicker" />
            <mat-datepicker #endPicker />
            <mat-error *ngIf="holidayAddForm.get('endDate')?.hasError('required')">
                End date is required
            </mat-error>
            <mat-error *ngIf="holidayAddForm.hasError('endBeforeStart')">
                End date cannot be before start date
            </mat-error>
        </mat-form-field>

    </form>

</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-stroked-button (click)="closeDialog()" [disabled]="isLoading">
        Cancel
    </button>
    <button mat-flat-button color="primary" (click)="addHoliday()" [disabled]="isLoading">
        @if (isLoading) { Saving... } @else { Add Holiday }
    </button>
</mat-dialog-actions>
