<mat-card class="cardWithShadow">
    <mat-card-content>
        <button matButton="filled" routerLink="/user/add">
            <mat-icon>person_add</mat-icon>Add User
        </button>
        <mat-card-title style="margin-top: 30px">All Employees</mat-card-title>

        <div class="table-responsive">
            <table mat-table [dataSource]="dataSource" class="w-100">
                <!-- Name Column -->
                <ng-container matColumnDef="username">
                    <th mat-header-cell *matHeaderCellDef class="f-w-600 f-s-14">Username</th>
                    <td mat-cell *matCellDef="let user">
                        <h6 class="f-s-16 m-b-4">
                            <span class="text-dark f-w-600">{{ user.userName }} </span>
                        </h6>
                    </td>
                </ng-container>

                <!-- Email Column -->
                <ng-container matColumnDef="email">
                    <th mat-header-cell *matHeaderCellDef class="f-w-600 f-s-14">
                        Email
                    </th>
                    <td mat-cell *matCellDef="let user">
                        <h6 class="f-s-16 m-b-4">
                            <span class="text-dark f-w-600">{{ user.email }}
                            </span>
                        </h6>
                    </td>
                </ng-container>

                <!-- Name Column -->
                <ng-container matColumnDef="role">
                    <th mat-header-cell *matHeaderCellDef class="f-w-600 f-s-14">
                        Role
                    </th>
                    <td mat-cell *matCellDef="let user">
                        <h6 class="f-s-16 m-b-4">
                            <span class="text-dark f-w-600">{{ user.role }}
                            </span>
                        </h6>
                    </td>
                </ng-container>

                <!-- Action Column -->
                <ng-container matColumnDef="action">
                    <th mat-header-cell *matHeaderCellDef class="f-w-600 f-s-14"></th>
                    <td mat-cell *matCellDef="let user">
                        <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="Example icon-button with a menu">
                            <mat-icon>more_vert</mat-icon>
                        </button>
                        <mat-menu #menu="matMenu">
                            <!-- <button mat-menu-item [routerLink]="['/user', user.id]">
                                <mat-icon>remove_red_eye</mat-icon>
                                <span>Details</span>
                            </button> -->
                            <button mat-menu-item [routerLink]="['/employee/edit', user.id]">
                                <mat-icon>edit</mat-icon>
                                <span>Edit</span>
                            </button>
                            <button mat-menu-item>
                                <mat-icon>delete</mat-icon>
                                <span>Delete</span>
                            </button>
                        </mat-menu>
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
            </table>
        </div>
    </mat-card-content>
</mat-card>
